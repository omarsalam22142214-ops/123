<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البث المباشر - قناة الجزيرة</title>
    <style>
        /* تنسيقات أساسية للصفحة */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            color: #333;
        }
        
        /* تنسيق الهيدر */
        header {
            background-color: #00478c;
            color: white;
            padding: 15px 20px;
            text-align: center;
        }

        /* الحاوية الرئيسية */
        .main-container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* حاوية الفيديو عشان يكون متجاوب مع كل الشاشات */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* نسبة العرض للارتفاع 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background-color: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* قسم الدردشة */
        .chat-section {
            margin-top: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #eef2f5;
            border-bottom: 1px solid #ddd;
        }

        .chat-btn {
            background-color: #cc0000;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .chat-btn:hover {
            background-color: #a30000;
        }

        /* حاوية الـ iframe بتاع الدردشة */
        #chat-iframe-wrapper {
            display: none; /* مخفي في البداية */
            height: 500px;
            width: 100%;
        }

        #chat-iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>البث الحي - الأخبار العاجلة</h1>
    </header>

    <div class="main-container">
        
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/bNyUyrR0PHo?rel=0&autoplay=1&mute=1" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

        <div class="chat-section">
            <div class="chat-header">
                <div>
                    <h3 style="margin: 0;">هل تريد الانضمام للمحادثة؟</h3>
                    <p style="margin: 5px 0 0 0; font-size: 14px; color: #666;">شارك برأيك في الدردشة المباشرة</p>
                </div>
                <button class="chat-btn" id="toggle-chat-btn" onclick="toggleChat()">إظهار الدردشة</button>
            </div>
            
            <div id="chat-iframe-wrapper">
                </div>
        </div>

    </div>

    <script>
        // معرف الفيديو واسم النطاق (عشان اليوتيوب بيطلب النطاق في الدردشة المباشرة)
        const videoId = "bNyUyrR0PHo"; 
        const domain = window.location.hostname || "localhost";
        
        let chatVisible = false;

        function toggleChat() {
            const chatWrapper = document.getElementById("chat-iframe-wrapper");
            const btn = document.getElementById("toggle-chat-btn");

            if (!chatVisible) {
                // إظهار الدردشة وبناء الـ iframe
                chatWrapper.style.display = "block";
                chatWrapper.innerHTML = `<iframe src="https://www.youtube.com/live_chat?v=${videoId}&embed_domain=${domain}"></iframe>`;
                btn.textContent = "إخفاء الدردشة";
                btn.style.backgroundColor = "#555"; 
                chatVisible = true;
            } else {
                // إخفاء الدردشة ومسح الـ iframe عشان نوفر موارد الجهاز
                chatWrapper.style.display = "none";
                chatWrapper.innerHTML = "";
                btn.textContent = "إظهار الدردشة";
                btn.style.backgroundColor = "#cc0000"; 
                chatVisible = false;
            }
        }
    </script>

</body>
</html>
